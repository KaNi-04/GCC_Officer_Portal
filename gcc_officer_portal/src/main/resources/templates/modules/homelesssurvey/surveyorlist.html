	<script th:inline="javascript">

		function loadZones() {

			$.ajax({
				url: "/gcc/api/homeless-survey/zones",
				type: "GET",
				success: function (data) {

					let html =
						'<option value="">Select Zone</option>';

					data.forEach(function (row) {

						html += `
                    <option value="${row.id}">
                        ${row.zone_name}
                    </option>
                `;
					});

					$("#zone").html(html);
				}
			});
		}
		$("#zone").change(function () {

			let zoneId = $(this).val();

			$("#ward").html(
				'<option value="">Select Ward</option>'
			);

			if (!zoneId) {
				return;
			}

			$.ajax({

				url: "/gcc/api/homeless-survey/wards",

				type: "GET",

				data: {
					zoneId: zoneId
				},

				success: function (data) {

					let html =
						'<option value="">Select Ward</option>';

					data.forEach(function (row) {

						html += `
                    <option value="${row.id}">
                        ${row.ward_name}
                    </option>
                `;
					});

					$("#ward").html(html);
				}
			});
		});
		function viewSurvey(
			loginId,
			zone,
			ward,
			surveyDate
		) {

			$.ajax({

				url:
					"/gcc/api/homeless-survey/surveyor-details",

				type: "GET",

				data: {

					loginId: loginId,
					zone: zone,
					ward: ward,
					surveyDate: surveyDate

				},

				success: function (response) {

					let html = "";

					response.forEach(function (item) {

						html += `

                <tr>

                    <!-- <td>
                        ${item.survey_date || ''}
                    </td>-->

					<td data-order="${item.survey_date}">
        ${formatDate(item.survey_date)}
    </td>

                    <td>
                        ${item.survey_id || ''}
                    </td>

                    <td>
                        ${item.name || ''}
                    </td>

                    <td>
                        ${item.gender || ''}
                    </td>

                    <td>
                        ${item.zone || ''}
                    </td>

                    <td>
                        ${item.ward || ''}
                    </td>

                    <td>

                        <button
                            class="btn btn-info btn-sm"

                            onclick="
                            viewSurveyDetails(
                            '${item.survey_id}'
                            )">

                            <i class="fa fa-eye"></i>

                        </button>

                    </td>

                </tr>
                `;
					});

					if (
						$.fn.DataTable.isDataTable(
							'#surveyDetailsTable'
						)
					) {

						$('#surveyDetailsTable')
							.DataTable()
							.destroy();
					}

					$('#surveyDetailsTable tbody')
						.html(html);

					$('#surveyDetailsTable')
						.DataTable({
							pageLength: 10,

							lengthChange: false, // Hide Show Entries dropdown

							info: false,



							dom: 'Blfrtip',

							buttons: [
								{
									extend: 'pageLength',
									className: 'btn btn-warning'
								},
								{
									extend: 'excelHtml5',
									text: 'Excel',
									className: 'btn btn-success'
								},
								{
									extend: 'pdfHtml5',
									text: 'PDF',
									className: 'btn btn-secondary',
									orientation: 'landscape',
									pageSize: 'A4'
								}
							]
						});

					$('#surveyModal')
						.modal('show');
				}
			});
		}
		$(document).ready(function () {

			// 🔹 Load dropdowns when page loads
			loadZones();
			loadSurveyors(true);

			// 🔹 (Optional) Load table initially
			// fetchSurveyData();
			// Restrict To Date based on From Date
			$("#fromDate").on("change", function () {

				let fromDate = $(this).val();

				// Set minimum selectable date for To Date
				$("#toDate").attr("min", fromDate);

				// If current To Date is less than From Date, clear it
				if ($("#toDate").val() < fromDate) {
					$("#toDate").val('');
				}
			});

		});
		function viewSurveyDetails(surveyId) {

			$.when(

				$.ajax({
					url: "/gcc/api/homeless-survey/details",
					type: "GET",
					data: {
						surveyId: surveyId
					}
				}),

				$.ajax({
					url: "/gcc/api/homeless-survey/categories",
					type: "GET"
				})

			).done(function (

				detailsResponse,
				categoryResponse

			) {

				let details =
					detailsResponse[0];

				let categories =
					categoryResponse[0];

				renderCategoryTabs(
					details,
					categories,
					surveyId
				);

				$('#surveyDetailsModal')
					.modal('show');
				$("#surveyModal")
					.modal("hide");
			});
		}
		function renderCategoryTabs(
			data,
			categories,
			surveyId
		) {

			let grouped = {};

			data.forEach(function (row) {

				let category =
					row.category_name;

				if (!grouped[category]) {

					grouped[category] = [];
				}

				grouped[category].push(row);
			});

			let tabsHtml = '';
			let contentHtml = '';

			categories.forEach(function (cat, index) {

				let category =
					cat.english_name;

				let questions =
					grouped[category] || [];

				tabsHtml += `

            <li class="nav-item me-2">

                <button
                    class="nav-link
                    ${index === 0 ? 'active' : ''}"

                    data-bs-toggle="pill"

                    data-bs-target="#tab${index}"

                    type="button">

                    ${category}

                </button>

            </li>
        `;

				contentHtml += `

            <div
                class="tab-pane fade
                ${index === 0 ? 'show active' : ''}"

                id="tab${index}">
        `;

				// Documents Download Button
				if (
					category === "Documents" &&
					questions.length > 0
				) {

					contentHtml += `

                <div class="text-end mb-3">

                    <button
                        class="btn btn-success btn-sm"

                        onclick="
                            downloadAllDocuments(
                                '${surveyId}'
                            )">

                        <i class="fa fa-download"></i>

                        Download All Documents

                    </button>

                </div>
            `;
				}

				// No Data
				if (questions.length === 0) {

					contentHtml += `

                <div
                    class="alert alert-light border">

                    No Data Available

                </div>
            `;
				}
				else {

					contentHtml += `
                <div class="row">
            `;

					questions.forEach(function (q) {

						let answer =
							q.answer || '-';

						// IMAGE
						if (
							q.question_type === 'image'
							||
							answer.match(/\.(jpg|jpeg|png|gif|webp)$/i)
						) {

							answer = `

                        <img
                            src="${answer}"

                            class="img-thumbnail"

                            style="
                                max-width:250px;
                                max-height:250px;
                                cursor:pointer;
                            "

                            onclick="
                                window.open(
                                    '${answer}',
                                    '_blank'
                                )
                            ">
                    `;
						}

						// FILE URL
						else if (
							String(answer)
								.startsWith("http")
						) {

							answer = `

                        <a
                            href="${answer}"

                            target="_blank"

                            class="btn btn-primary btn-sm">

                            View File

                        </a>
                    `;
						}

						contentHtml += `

                    <div
                        class="col-md-6 mb-3">

                        <div class="detail-card">

                            <div class="detail-label">

                                ${q.question}

                            </div>

                            <div class="detail-value">

                                ${answer}

                            </div>

                        </div>

                    </div>
                `;
					});

					contentHtml += `
                </div>
            `;
				}

				contentHtml += `
            </div>
        `;
			});

			$('#categoryTabs')
				.html(tabsHtml);

			$('#categoryTabContent')
				.html(contentHtml);
		}

		/*function downloadAllDocuments(surveyId) {

			window.location.href =
				'/gcc/api/homeless-survey/download-all-documents?surveyId='
				+ encodeURIComponent(surveyId);
		}*/


		function downloadAllDocuments(surveyId) {

			$.ajax({

				url: "/gcc/api/homeless-survey/document-count",

				type: "GET",

				data: {
					surveyId: surveyId
				},

				success: function (count) {

					if (count === 0) {

						Swal.fire({
							icon: 'info',
							title: 'No Documents',
							text: 'No documents have been uploaded for this survey.'
						});

						return;
					}

					window.location.href =
						'/gcc/api/homeless-survey/download-all-documents?surveyId='
						+ encodeURIComponent(surveyId);
				},

				error: function () {

					Swal.fire({
						icon: 'error',
						title: 'Error',
						text: 'Unable to verify documents.'
					});
				}
			});
		}


		function resetFilters() {
			$("#zone").val('');
			$("#ward").val('');
			$("#fromDate").val('');
			$("#toDate").val('');

			// Re-load table with all data
			loadSurveyors(true);
		}

		function loadSurveyors(isInitialLoad = false) {
			console.log('zone:', $("#zone").val());
			console.log('ward:', $("#ward").val());
			console.log('fromDate:', $("#fromDate").val());
			console.log('toDate:', $("#toDate").val());

			var zone = $("#zone").val();
			var ward = $("#ward").val();
			var fromDate = $("#fromDate").val();
			var toDate = $("#toDate").val();

			if (!isInitialLoad &&
				zone == '' &&
				ward == '' &&
				fromDate == '' &&
				toDate == '') {

				Swal.fire({
					icon: 'warning',
					title: 'Warning',
					text: 'Please select at least one filter.',
					confirmButtonColor: '#3085d6'
				});

				return;
			}
			if (fromDate != '') {
				if (toDate == '') {
					Swal.fire({
						icon: 'warning',
						title: 'Warning',
						text: 'Please select both from date and to date.',
						confirmButtonColor: '#3085d6'
					});
					return;
				}
			}
			if (toDate != '') {
				if (fromDate == '') {
					Swal.fire({
						icon: 'warning',
						title: 'Warning',
						text: 'Please select both from date and to date.',
						confirmButtonColor: '#3085d6'
					});
					return;
				}
			}



			if ($.fn.DataTable.isDataTable('#surveyorTable')) {

				$('#surveyorTable')
					.DataTable()
					.destroy();
			}

			$("#surveyorTable tbody").empty();

			$.ajax({

				url: "/gcc/api/homeless-survey/getSurveyorsList",

				type: "GET",

				data: {

					zone: zone,
					ward: ward,
					fromDate: fromDate,
					toDate: toDate
				},

				success: function (response) {

					let rows = "";

					$.each(response, function (i, item) {

						rows += `

                    <tr>

                        <!--td>${formatDate(item.survey_date)}</td-->
						 <td data-order="${item.survey_date}">
        ${formatDate(item.survey_date)}
    </td>

                        <td>${item.user_name || ''}</td>

                        <td>${item.mobile_no || ''}</td>

                        <td>${item.zone || ''}</td>

                        <td>${item.ward || ''}</td>

                        <td>${item.total_survey_done || 0}</td>

                        <td>

                            <button
                                class="btn btn-info btn-sm"

                                onclick="
                                    viewSurvey(
                                        '${item.loginId}',
                                        '${item.zone}',
                                        '${item.ward}',
                                        '${item.survey_date}'
                                    )">

                                <i class="fa fa-eye"></i>

                            </button>

                        </td>

                    </tr>
                `;
					});

					$("#surveyorTable tbody").html(rows);

					$('#surveyorTable').DataTable({

						dom: 'Bfrtip',

						buttons: [

							{
								extend: 'pageLength',
								className: 'btn btn-warning'
							},

							{
								extend: 'excelHtml5',
								text: 'Excel',
								className: 'btn btn-success'
							},

							{
								extend: 'pdfHtml5',
								text: 'PDF',
								className: 'btn btn-secondary'
							}
						],

						pageLength: 10,
						responsive: true
					});
				}
			});
		}
		function formatDate(dateString) {

			if (!dateString) return '';

			const date = new Date(dateString);

			const day = String(date.getDate()).padStart(2, '0');

			const month = String(date.getMonth() + 1).padStart(2, '0');

			const year = date.getFullYear();

			return `${day}-${month}-${year}`;
		}
		function loadDropdowns() {

			// Gender
			$.ajax({
				url: "/gcc/api/children-survey/gender",
				type: "GET",
				success: function (data) {

					let options = '<option value="">Gender</option>';

					data.forEach(function (g) {
						options += `<option value="${g.id}">${g.english_name}</option>`;
					});

					$("#gender").html(options);
				}
			});

			// Area
			$.ajax({
				url: "/gcc/api/children-survey/location",
				type: "GET",
				success: function (data) {

					let options = '<option value="">Area</option>';

					data.forEach(function (a) {
						options += `<option value="${a.id}">${a.english_name}</option>`;
					});

					$("#area").html(options);
				}
			});

			// Education
			$.ajax({
				url: "/gcc/api/children-survey/education",
				type: "GET",
				success: function (data) {

					let options = '<option value="">Education</option>';

					data.forEach(function (e) {
						options += `<option value="${e.id}">${e.english_name}</option>`;
					});

					$("#education").html(options);
				}
			});

		}


	</script>
</body>
