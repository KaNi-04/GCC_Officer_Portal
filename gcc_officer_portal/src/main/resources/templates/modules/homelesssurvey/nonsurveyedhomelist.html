	<script th:inline="javascript">

		function loadZones() {

			$.ajax({
				url: "/gcc/api/homeless-survey/zones",
				type: "GET",
				success: function (data) {

					let html =
						'<option value="">Select Zone</option>';

					data.forEach(function (row) {

						html += `
                    <option value="${row.id}">
                        ${row.zone_name}
                    </option>
                `;
					});

					$("#zone").html(html);
				}
			});
		}
		$("#zone").change(function () {

			let zoneId = $(this).val();

			$("#ward").html(
				'<option value="">Select Ward</option>'
			);

			if (!zoneId) {
				return;
			}

			$.ajax({

				url: "/gcc/api/homeless-survey/wards",

				type: "GET",

				data: {
					zoneId: zoneId
				},

				success: function (data) {

					let html =
						'<option value="">Select Ward</option>';

					data.forEach(function (row) {

						html += `
                    <option value="${row.id}">
                        ${row.ward_name}
                    </option>
                `;
					});

					$("#ward").html(html);
				}
			});
		});

		async function downloadBulkSurveyExcel() {

			try {

				Swal.fire({
					title: 'Preparing Excel...',

					allowOutsideClick: false,
					didOpen: () => {
						Swal.showLoading();
					}
				});

				// GET TABLE DATA
				let table = $('#surveyTable').DataTable();

				let rows = table.rows().data().toArray();

				if (rows.length === 0) {

					Swal.fire({
						icon: 'warning',
						title: 'No Data Found'
					});

					return;
				}

				let excelData = [];

				let slno = 1;

				/*for (const rowNode of rows) {
	
					// GET SURVEY ID FROM TABLE
					let surveyId = $(rowNode[1]).text() || rowNode[1];
	
					surveyId = surveyId.toString().trim();
	
					// CALL DETAILS API
					let surveyData = await $.ajax({
						url: "/gcc/api/children-survey/details",
						type: "GET",
						data: {
							surveyId: surveyId
						}
					});
	
					// MERGE ALL SECTIONS
					let allQuestions = {
	
						...surveyData.personalInformation,
						...surveyData.locationDetails,
						...surveyData.educationDetails,
						...surveyData.healthDetails,
						...surveyData.documentDetails,
						...surveyData.vulnerabilityDetails
					};
	
					// CREATE ROW OBJECT
					let rowData = {
						"S.No": slno,
						"Survey ID": surveyId
					};
	
					// ADD ALL QUESTIONS AS COLUMNS
					Object.keys(allQuestions).forEach(function (question) {
	
						rowData[question] = allQuestions[question];
	
					});
	
					excelData.push(rowData);
	
					slno++;
				}*/
				for (const rowNode of rows) {

					let surveyId = $(rowNode[1]).text() || rowNode[1];

					surveyId = surveyId.toString().trim();

					// SKIP EMPTY ROWS
					if (!surveyId || surveyId === "") {
						continue;
					}

					let surveyData = await $.ajax({
						url: "/gcc/api/children-survey/details",
						type: "GET",
						data: {
							surveyId: surveyId
						}
					});


					let allQuestions = {


						...surveyData.locationDetails,
						...surveyData.personalInformation,
						...surveyData.educationDetails,
						...surveyData.healthDetails,
						...surveyData.documentDetails,
						...surveyData.vulnerabilityDetails
					};

					let rowData = {
						"S.No": slno,
						"Survey ID": surveyId
					};

					Object.keys(allQuestions).forEach(function (question) {

						rowData[question] = allQuestions[question];

					});

					excelData.push(rowData);

					slno++;
				}

				// CREATE WORKSHEET
				//const worksheet = XLSX.utils.json_to_sheet(excelData);
				// FIXED COLUMN ORDER
				const headers = [

					"S.No",
					"Survey ID",

					// LOCATION
					"Select the Area",
					"Type of House Ownership",
					"How Long You Have Been Staying Here?",
					"Block No",
					"House No",

					// PERSONAL
					"Name of the Child",
					"Gender",
					"Do you know DOB?",
					"Date of Birth",
					"Age",
					"Place of Birth",
					"Hospital of Birth",
					"Religion",
					"Caste",
					"Sub Caste",
					"Child Living With",
					"Father Name",
					"Mother Name",
					"Where about of Father?",
					"Where about of Mother?",
					"Guardian Name",
					"Relationship",
					"Occupation",
					"Family Monthly Income",
					"Contact Number",

					// EDUCATION
					"Are they Currently Studying",
					"Education Status",
					"School Name",

					// VULNERABILITY

				// CREATE NEW ORDERED DATA
				let orderedExcelData = [];

				excelData.forEach(function (row) {

		$(document).ready(function () {

			// 🔹 Load dropdowns when page loads
			loadZones();
			loadHomelessNonSurveyedList(true);

			// 🔹 (Optional) Load table initially
			// fetchSurveyData();
			// Restrict To Date based on From Date
			$("#fromDate").on("change", function () {

				let fromDate = $(this).val();

				// Set minimum selectable date for To Date
				$("#toDate").attr("min", fromDate);

				// If current To Date is less than From Date, clear it
				if ($("#toDate").val() < fromDate) {
					$("#toDate").val('');
				}
			});

		});

		function resetFilters() {
			$("#zone").val('');
			$("#ward").val('');
			$("#fromDate").val('');
			$("#toDate").val('');

			// Re-load table with all data
			loadHomelessNonSurveyedList(true);
		}

		function loadHomelessNonSurveyedList(isInitialLoad) {

			let zone = $("#zone").val();
			let ward = $("#ward").val();
			let fromDate = $("#fromDate").val();
			let toDate = $("#toDate").val();
			if (!isInitialLoad &&
				zone == '' &&
				ward == '' &&
				fromDate == '' &&
				toDate == '') {

				Swal.fire({
					icon: 'warning',
					title: 'Warning',
					text: 'Please select at least one filter.',
					confirmButtonColor: '#3085d6'
				});

				return;
			}
			if (fromDate != '') {
				if (toDate == '') {
					Swal.fire({
						icon: 'warning',
						title: 'Warning',
						text: 'Please select both from date and to date.',
						confirmButtonColor: '#3085d6'
					});
					return;
				}
			}
			if (toDate != '') {
				if (fromDate == '') {
					Swal.fire({
						icon: 'warning',
						title: 'Warning',
						text: 'Please select both from date and to date.',
						confirmButtonColor: '#3085d6'
					});
					return;
				}
			}



			$('#surveyTable').DataTable({

				destroy: true,

				ajax: {

					url: "/gcc/api/homeless-survey/nonsurveyed/list",

					data: {
						zone: zone,
						ward: ward,
						fromDate: fromDate,
						toDate: toDate
					},

					dataSrc: ""
				},
				createdRow: function (row, data, dataIndex) {
					// 🔹 Format the date in the first column
					const surveyDate = data.survey_date;
					if (surveyDate) {
						$('td:eq(0)', row).text(formatDate(surveyDate));
					}
				},

				dom: 'Bfrtip',

				buttons: [

					{
						extend: 'pageLength',
						className: 'btn btn-warning'
					},

					{
						extend: 'excelHtml5',
						text: 'Excel',
						className: 'btn btn-success'
					},

					{
						extend: 'pdfHtml5',
						text: 'PDF',
						className: 'btn btn-secondary',
						orientation: 'landscape',
						pageSize: 'A4'
					}
				],

				responsive: true,

				columns: [

					{ data: "survey_date" },
					{ data: "survey_id" },
					{ data: "name" },
					{ data: "age" },
					{ data: "dob" },
					{ data: "zone" },
					{ data: "ward" },

					{
						data: "image_url",
						render: function (data) {

							if (data) {

								return '<a href="' + data +
									'" target="_blank">View Photo</a>';
							}

							return "-";
						}
					},

					{ data: "remarks" }
				]
			});
		}
		function formatDate(dateString) {

			if (!dateString) return '';

			const date = new Date(dateString);

			const day = String(date.getDate()).padStart(2, '0');

			const month = String(date.getMonth() + 1).padStart(2, '0');

			const year = date.getFullYear();

			return `${day}-${month}-${year}`;
		}
		function loadDropdowns() {

			// Gender
			$.ajax({
				url: "/gcc/api/children-survey/gender",
				type: "GET",
				success: function (data) {

					let options = '<option value="">Gender</option>';

					data.forEach(function (g) {
						options += `<option value="${g.id}">${g.english_name}</option>`;
					});

					$("#gender").html(options);
