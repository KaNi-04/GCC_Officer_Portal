	<script th:inline="javascript">

		function loadZones() {

			$.ajax({
				url: "/gcc/api/homeless-survey/zones",
				type: "GET",
				success: function (data) {

					let html =
						'<option value="">Select Zone</option>';

					data.forEach(function (row) {

						html += `
                    <option value="${row.id}">
                        ${row.zone_name}
                    </option>
                `;
					});

					$("#zone").html(html);
				}
			});
		}
		$("#zone").change(function () {

			let zoneId = $(this).val();

			$("#ward").html(
				'<option value="">Select Ward</option>'
			);

			if (!zoneId) {
				return;
			}

			$.ajax({

				url: "/gcc/api/homeless-survey/wards",

				type: "GET",

				data: {
					zoneId: zoneId
				},

				success: function (data) {

					let html =
						'<option value="">Select Ward</option>';

					data.forEach(function (row) {

						html += `
                    <option value="${row.id}">
                        ${row.ward_name}
                    </option>
                `;
					});

					$("#ward").html(html);
				}
			});
		});
		async function downloadBulkHomelessExcel() {

			try {

				const questionOrder = [


					"Full Name as per document",
					"Native Place State",
					"Native Place District",

					"Mobile Availability",
					"Mobile Number",
					"Relation Type",
					"Relationship's Mobile Number",

					"Gender",
					"Date of Birth",
					"Age",
					"current address",
					"Religion",
					"Caste",
					"Currently Living Status",
					"Current Martial Status",

					"Does the person identity themselves as a person with a disability?",
					"select the type of disability",
					"Does the person have a disability certificate?",
					"Upload Disability Certificate if available",
					"If No, why?",
					"Does the person have any health conditions",

					"Educational Qualification",
					"Educational Status",
					"Reasons for discontinuing education",
					"Interested in further education?",
					"Remarks",

					"Is the person employed?",
					"Nature of employment?",
					"Type of employment?",
					"Occupation Status",
					"Duration of Occupation",
					"Place of Occupation (street/Area)",
					"Landmark",
					"monthly income of the family",
					"Is the work place and place of living the same?",
					"Reason for not employment",

					"Reason for being homeless",
					"Place of sleeping",
					"Type of sleeping space",
					"How long have you been living in this place?",
					"Do you shift locations?",
					"If yes, how often?",
					"Reason for moving",
					"Have you ever stayed in a GCC shelter?",
					"If yes, where?",
					"If yes, Why did you come out of the shelter?",
					"Do you wish to stay in a GCC shelter?",
					"If No, why GCC shelter?",

					// DOCUMENTS

					"Birth Certificate",
					"Birth Certificate File Upload",
					"Birth Certificate If No Why",

					"Community Certificate",
					"Community Certificate File Upload",
					"Community Certificate If No Why",

					"Voter Id Card",
					"Voter Id File Upload",
					"Voter Id If No Why",

					"Adhar card",
					"Adhar File Upload",
					"Adhar If No Why",

					"Smart card",
					"Smart Card File Upload",
					"Smart Card If No Why",

					"Driving licence",
					"Driving Licence File Upload",
					"Driving Licence If No Why",

					"CM Health insurance",
					"CM Health Insurance File Upload",
					"CM Health Insurance If No Why",

					"Bank Passbook",
					"Bank Passbook File Upload",
					"Bank Passbook If No Why",

					"Have you enrolled in any welfare board",
					"If yes, specify",
					"Any remarks/comments"
				];

				Swal.fire({
					title: 'Preparing Excel...',
					text: 'Please wait',
					allowOutsideClick: false,
					didOpen: () => {
						Swal.showLoading();
					}
				});

				let table = $('#surveyTable').DataTable();

				let rows = table.rows().data().toArray();

				if (rows.length === 0) {

					Swal.fire({
						icon: 'warning',
						title: 'No Data Found'
					});

					return;
				}

				let excelData = [];

				let slno = 1;

				for (const rowNode of rows) {

					let surveyId = rowNode[1];

					surveyId = surveyId.toString().trim();

					if (!surveyId) {
						continue;
					}

					let surveyData = await $.ajax({

						url: "/gcc/api/homeless-survey/details",

						type: "GET",

						data: {
							surveyId: surveyId
						}
					});

					let rowData = {

						"S.No": slno,

						"Survey ID": surveyId
					};

					questionOrder.forEach(function (question) {

						rowData[question] = "";
					});

					surveyData.forEach(function (item) {

						let qid = parseInt(item.qid);

						let answer = item.answer || '';

						if (typeof answer === 'string') {

							answer = answer
								.replace(/<[^>]*>/g, '')
								.trim();
						}

						switch (qid) {
							case 48:
								rowData["If No, why GCC shelter?"] = answer;
								return;

							case 50:
								rowData["Birth Certificate File Upload"] = answer;
								return;

							case 51:
								rowData["Birth Certificate If No Why"] = answer;
								return;

							case 53:
								rowData["Community Certificate File Upload"] = answer;
								return;

							case 54:
								rowData["Community Certificate If No Why"] = answer;
								return;

							case 56:
								rowData["Voter Id File Upload"] = answer;
								return;

							case 57:
								rowData["Voter Id If No Why"] = answer;
								return;

							case 59:
								rowData["Adhar File Upload"] = answer;
								return;

							case 60:
								rowData["Adhar If No Why"] = answer;
								return;

							case 62:
								rowData["Smart Card File Upload"] = answer;
								return;

							case 63:
								rowData["Smart Card If No Why"] = answer;
								return;

							case 65:
								rowData["Driving Licence File Upload"] = answer;
								return;

							case 66:
								rowData["Driving Licence If No Why"] = answer;
								return;

							case 68:
								rowData["CM Health Insurance File Upload"] = answer;
								return;

							case 69:
								rowData["CM Health Insurance If No Why"] = answer;
								return;

							case 71:
								rowData["Bank Passbook File Upload"] = answer;
								return;

							case 72:
								rowData["Bank Passbook If No Why"] = answer;
								return;
						}

						let question = item.question
							? item.question.trim()
							: "";

						if (rowData.hasOwnProperty(question)) {

							rowData[question] = answer;
						}
					});

					excelData.push(rowData);

					slno++;
				}

				if (excelData.length === 0) {

					Swal.fire({
						icon: 'warning',
						title: 'No Data Found'
					});

					return;
				}

				const worksheet = XLSX.utils.json_to_sheet(excelData);

				const workbook = XLSX.utils.book_new();

				XLSX.utils.book_append_sheet(
					workbook,
					worksheet,
					"Homeless Survey"
				);

				const columns = [];

				Object.keys(excelData[0]).forEach(function (key) {

					if (key === "S.No") {

						columns.push({ wch: 8 });

					} else if (key === "Survey ID") {

						columns.push({ wch: 30 });

					} else {

						columns.push({ wch: 40 });
					}
				});

				worksheet['!cols'] = columns;

				XLSX.writeFile(
					workbook,
					"Homeless_Survey_Report.xlsx"
				);

				Swal.close();

			} catch (e) {

				console.log(e);

				Swal.fire({

					icon: 'error',

					title: 'Excel Download Failed',

					text: e.message
				});
			}
		}

		function viewSurvey(surveyId) {

					type: "GET",
					data: {
						surveyId: surveyId
					}
				}),

					detailsResponse[0];

				let categories =

		function renderCategoryTabs(
			data,
			categories,
			surveyId
		) {

			let grouped = {};

			data.forEach(function (row) {

				let category =
					row.category_name;

				if (!grouped[category]) {

					grouped[category] = [];
				}

				grouped[category].push(row);
			});

			let tabsHtml = '';
			let contentHtml = '';

			categories.forEach(function (cat, index) {

				let category =
					cat.english_name;

				let questions =
					grouped[category] || [];

				tabsHtml += `

            <li class="nav-item me-2">

                <button
                    class="nav-link
                    ${index === 0 ? 'active' : ''}"

                    data-bs-toggle="pill"

                    data-bs-target="#tab${index}"

                    type="button">

                    ${category}

                </button>

            </li>
        `;

				contentHtml += `

            <div
                class="tab-pane fade
                ${index === 0 ? 'show active' : ''}"

                id="tab${index}">
        `;

				// Documents Download Button
				if (
					category === "Documents" &&
					questions.length > 0
				) {

					contentHtml += `

                <div class="text-end mb-3">

                    <button
                        class="btn btn-success btn-sm"

                        onclick="
                            downloadAllDocuments(
                                '${surveyId}'
                            )">

                        <i class="fa fa-download"></i>

                        Download All Documents

                    </button>

                </div>
            `;
				}

				// No Data
				if (questions.length === 0) {

					contentHtml += `

                <div
                    class="alert alert-light border">

                    No Data Available

                </div>
            `;
				}
				else {

					contentHtml += `
                <div class="row">
            `;

					questions.forEach(function (q) {

						let answer =
							q.answer || '-';

						// IMAGE
						if (
							q.question_type === 'image'
							||
							answer.match(/\.(jpg|jpeg|png|gif|webp)$/i)
						) {

							answer = `

                        <img
                            src="${answer}"

                            class="img-thumbnail"

                            style="
                                max-width:250px;
                                max-height:250px;
                                cursor:pointer;
                            "

                            onclick="
                                window.open(
                                    '${answer}',
                                    '_blank'
                                )
                            ">
                    `;
						}

						// FILE URL
						else if (
							String(answer)
								.startsWith("http")
						) {

							answer = `

                        <a
                            href="${answer}"

                            target="_blank"

                            class="btn btn-primary btn-sm">

                            View File

                        </a>
                    `;
						}

						contentHtml += `

                    <div
                        class="col-md-6 mb-3">

                        <div class="detail-card">

                            <div class="detail-label">

                                ${q.question}

                            </div>

                            <div class="detail-value">

                                ${answer}

                            </div>

                        </div>

                    </div>
                `;
					});

					contentHtml += `
                </div>
            `;
				}

				contentHtml += `
            </div>
        `;
			});

			$('#categoryTabs')
				.html(tabsHtml);

			$('#categoryTabContent')
				.html(contentHtml);
		}

		function formatDate(dateString) {

			if (!dateString) return '';

			const date = new Date(dateString);

			const day = String(date.getDate()).padStart(2, '0');

			const month = String(date.getMonth() + 1).padStart(2, '0');

			const year = date.getFullYear();

			return `${day} -${month} -${year} `;
		}

		function downloadAllDocuments(surveyId) {

			$.ajax({

				url: "/gcc/api/homeless-survey/document-count",

				type: "GET",

				data: {
					surveyId: surveyId
				},

				success: function (count) {

					if (count === 0) {

						Swal.fire({
							icon: 'info',
							title: 'No Documents',
							text: 'No documents have been uploaded for this survey.'
						});

						return;
					}

					window.location.href =
						'/gcc/api/homeless-survey/download-all-documents?surveyId='
						+ encodeURIComponent(surveyId);
				},

				error: function () {

					Swal.fire({
						icon: 'error',
						title: 'Error',
						text: 'Unable to verify documents.'
					});
				}
			});
		}
