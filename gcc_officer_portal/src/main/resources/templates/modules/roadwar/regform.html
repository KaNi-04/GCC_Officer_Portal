	<script type="text/javascript">

		var createdBy = /*[[${LoginUserId}]]*/'';

		$(document).ready(function () {

			loadRoadTypes();


			$.ajax({
				url: '/gcc/api/roadwarweb/register/getzones',
				type: 'GET',
				success: function (response) {

					$('#zoneDropdown').empty()
						.append('<option value="">Select Zone</option>');

					if (response.status) {

						$.each(response.data, function (index, zone) {

							$('#zoneDropdown').append(
								'<option value="' + zone.zone_name + '">' +
								zone.zone_name +
								'</option>'
							);

						});

					}
				},
				error: function () {
					alert('Failed to load zones.');
				}
			});


			loadMonths();
			loadYears();

			$("#addMoreBtn").click(function () {

				let block = $(".relaying-block:first").clone();

				block.find("input").val("");
				block.find("textarea").val("");
				block.find("select").val("");

				block.find(".removeBlock").removeClass("d-none");

				$("#roadRelayingContainer").append(block);

				loadMonths(block.find(".monthDropdown"));
				loadYears(block.find(".yearDropdown"));
			});

			$(document).on("click", ".removeBlock", function () {
				$(this).closest(".relaying-block").remove();
			});

		});


		$('#zoneDropdown').change(function () {

			let zone = $(this).val();

			$('#wardDropdown').empty()
				.append('<option value="">Select Ward</option>');

			if (zone) {

				$.ajax({
					url: '/gcc/api/roadwarweb/register/getwardbyzone',
					type: 'GET',
					data: {
						zone: zone
					},
					success: function (response) {

						if (response.status) {

							$.each(response.data, function (index, ward) {

								$('#wardDropdown').append(
									'<option value="' + ward.ward_name + '">' +
									ward.ward_name +
									'</option>'
								);

							});

						}

					},
					error: function () {
						alert('Failed to load wards.');
					}
				});

			}




		});


		$('#wardDropdown').change(function () {

			let ward = $(this).val();

			$('#roadDropdown').empty()
				.append('<option value="">Select Road</option>');

			if (ward) {

				$.ajax({
					url: '/gcc/api/roadwarweb/register/getRoadNamesByWard',
					type: 'GET',
					data: {
						ward: ward
					},
					beforeSend: function () {
						$("#pageLoader").show();
					},
					success: function (response) {

						console.log("API Response:", response);

						if (response.status && response.data.length > 0) {

							$.each(response.data, function (index, road) {

								console.log("Road:", road);

								$('#roadDropdown').append(
									$('<option>', {
										value: road.road_id,
										text:  road.road_name
									}).attr('data-road-name', road.road_name)
								);
							});
							
							// Destroy existing Select2 if already initialized
					        if ($('#roadDropdown').hasClass("select2-hidden-accessible")) {
					            $('#roadDropdown').select2('destroy');
					        }

					        // Initialize Select2
					        $('#roadDropdown').select2({
					            placeholder: "Select Road",
					            allowClear: true,
					            width: '100%'
					        });

						} else {
							console.log("No roads found");
						}
					},
					error: function (xhr, status, error) {
						console.log("Error:", error);
						console.log(xhr.responseText);
					},
					complete: function () {
						$("#pageLoader").hide();
					}
				});
			}
		});




		function loadRoadTypes() {
			$.ajax({
				url: '/gcc/api/roadwarweb/register/getRoadType',
				type: 'GET',
				success: function (response) {

					if (response.status) {

						let dropdown = $("#roadTypeDropdown");

						// Clear existing options except default
						dropdown.empty();
						dropdown.append('<option value="">Select Road Type</option>');

						$.each(response.data, function (index, item) {
							dropdown.append(
								'<option value="' + item.id + '">' +
								item.roadType +
								'</option>'
							);
						});

					} else {
						alert(response.message);
					}
				},
				error: function (xhr, status, error) {
					console.error("Error fetching road types:", error);
				}
			});
		}


		function loadMonths(dropdown = $(".monthDropdown")) {

			$.ajax({
				url: "/gcc/api/roadwarweb/register/getMonthList",
				type: "GET",
				success: function (response) {

					if (response.status) {

						dropdown.each(function () {

							let select = $(this);

							select.empty()
								.append('<option value="">Select Month</option>');

							$.each(response.data, function (i, month) {

		// ── Decimal-only enforcement for (m) and (inches) inputs ────────────────
		$(document).on('keypress', '.decimal-only', function (e) {
			let char = String.fromCharCode(e.which);
			let val = $(this).val();
			// Allow digits and a single decimal point
			if (!/[0-9.]/.test(char)) { e.preventDefault(); return; }
			if (char === '.' && val.indexOf('.') !== -1) { e.preventDefault(); }
		});

		// Paste guard: strip non-numeric characters
		$(document).on('paste', '.decimal-only', function (e) {
			setTimeout(() => {
				let v = $(this).val().replace(/[^0-9.]/g, '');
				// Keep only first decimal point
				let parts = v.split('.');
				if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
				$(this).val(v);
			}, 0);
		});

						});

							title: "Error",
							text: response.message
						});

					}

				},

					Swal.fire({
						icon: "error",
						title: "Error",
						text: "Failed to save details"
					});

				}
			});
