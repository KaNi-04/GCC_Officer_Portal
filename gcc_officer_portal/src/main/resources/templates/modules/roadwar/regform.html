						// Clear existing options except default

						dropdown.append('<option value="">Select Road Type</option>');

						$.each(response.data, function (index, item) {

								'<option value="' + item.id + '">' +

		$(document).on('keypress', '.decimal-only', function (e) {
			let char = String.fromCharCode(e.which);
			let val = $(this).val();
			// Allow digits and a single decimal point
			if (!/[0-9.]/.test(char)) { e.preventDefault(); return; }
			if (char === '.' && val.indexOf('.') !== -1) { e.preventDefault(); }
		});

		// Paste guard: strip non-numeric characters
		$(document).on('paste', '.decimal-only', function (e) {
			setTimeout(() => {
				let v = $(this).val().replace(/[^0-9.]/g, '');
				// Keep only first decimal point
				let parts = v.split('.');
				if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
				$(this).val(v);
			}, 0);
		});
		
		$(document).on('input', '.integer-only', function () {

				is_manhole: $('input[name="mhAvailable"]:checked').val() || "",
				manhole_at :$("#mhType").val()|| null,				
				manhole_count: $("#mhCount").val().trim() || null,
				r_mhCount: $("#r_mhCount").val().trim() || null,
				
				is_cpipe: $('input[name="cpAvailable"]:checked').val() || "",
				cp_at:$("#cp_at").val()|| null,
				cpipe_count:$("#cpCount").val().trim() || null,
				r_cpCount:$("#r_cpCount").val().trim() || null,

				is_rwh: $('input[name="rwAvailable"]:checked').val() || "",
				rwh_at :$("#rwh_at").val()|| null,
				rwh_count:$("#rwCount").val().trim() || null,
				r_rwCount:$("#r_rwCount").val().trim() || null,

				sewer_length: $("#sewerLength").val().trim()|| null,
				sewer_size: $("#sewerSize").val().trim()|| null,

				is_electric_poles: $('input[name="epAvailable"]:checked').val() || "",
				ep_count: $('input[name="epAvailable"]:checked').val() === "yes" ? ($("#epCount").val().trim() || null) : null,
						
				is_streetlight_poles: $('input[name="slpAvailable"]:checked').val() || "",
				streetlight_poles_count:$('input[name="slpAvailable"]:checked').val() === "yes" ? ($("#slpCount").val().trim() || null) : null,
						
				is_hml: $('input[name="hmlAvailable"]:checked').val() || "",
				hml_count:$('input[name="hmlAvailable"]:checked').val() === "yes" ? ($("#hmlCount").val().trim() || null) : null,

				is_mml:$('input[name="mmlAvailable"]:checked').val() || "",
				mml_count:$('input[name="mmlAvailable"]:checked').val() === "yes" ? ($("#mmlCount").val().trim() || null) : null,
						
				culvert_bridge_count: $("#noofcb").val().trim()|| null,
				details: $("#detailsofcb").val().trim()|| null,

				is_busshelter: $('input[name="bsAvailable"]:checked').val() || "",
				busshelter_count: $('input[name="bsAvailable"]:checked').val() === "yes" ? ($("#bsCount").val().trim() || null) : null,

				is_centermedian: $('input[name="cmAvailable"]:checked').val() || "",

				erp_asset_code: "",
				cby: userId,

				relaying_details: relayingDetails
			};

			console.log(payload);

			$.ajax({
				url: "/gcc/api/roadwarweb/register/saveRoadWarDetails",
				type: "POST",
				contentType: "application/json",
				data: JSON.stringify(payload),

				beforeSend: function () {
					$("#pageLoader").show();
				},

				success: function (response) {

					$("#pageLoader").hide();

					if (response.status) {

						$('#saveBtn').prop('disabled', false);
						Swal.fire({
							icon: "success",
							title: "Success",
							text: response.message
						}).then(() => {
							location.reload();
						});

					} else {
						
						$('#saveBtn').prop('disabled', false);

						Swal.fire({
							icon: "error",
							title: "Error",
							text: response.message
						});

					}

				},

				error: function () {
					
					$('#saveBtn').prop('disabled', false);

					$("#pageLoader").hide();

					Swal.fire({
						icon: "error",
						title: "Error",
						text: "Failed to save details"
					});

				}
			});

		});
		
		
		$('#roadDropdown').on('change', function () {

		    let roadId = $(this).val();

		    if (!roadId) {
		        return;
		    }

		    $.ajax({
		        url: '/gcc/api/roadwarweb/register/checkRoadExists',
		        type: 'GET',
		        data: {
		            roadId: roadId
		        },
		        success: function (response) {

		            if (response.status && response.exists) {

		                Swal.fire({
		                    icon: 'warning',
		                    title: 'Already Registered',
		                    text: 'Selected road already registered.'
		                });

		                $('#roadDropdown').val('').trigger('change');
		            }
		        }
		    });

		});
		
		function validate(value, fieldName) {
		    if (parseFloat(value) <= 0) {
		    	$('#saveBtn').prop('disabled', false);
		        Swal.fire("Invalid Value", fieldName + " must be greater than 0.", "warning");
		        return false;
		    }
		    return true;
		}


	</script>

</body>
