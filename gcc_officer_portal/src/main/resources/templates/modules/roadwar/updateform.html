	function loadWards(zone, selectedWard = null) {

	return  $.ajax({
	        url: '/gcc/api/roadwarweb/register/getwardbyzone',
	        type: 'GET',
	        data: { zone: zone },

	        success: function (response) {

	            $('#view_ward').empty()
	                .append('<option value="">Select Ward</option>');

	            if (response.status) {

	                $.each(response.data, function (index, ward) {

	                    $('#view_ward').append(
	                        `<option value="${ward.ward_name}">

	                        </option>`
	                    );

	                });

	                if (selectedWard) {
	                    $('#view_ward').val(selectedWard);
	                }
	            }
	        }
	    });
	}

	                $.each(response.data, function (index, road) {

	                    $('#view_road_name').append(

							text:  road.road_name

	                    );

	            $.ajax({

	                url: '/gcc/api/roadwarweb/register/deleteRoadWarDetails',

	                data: {
	                    refId: refId,
	                    updatedby:deleteby
	                },

	                    $("#pageLoader").show();
	                },

	                success: function (response) {

	                    if (response.status) {

	                        Swal.fire(
	                            'Deleted!',
	                            response.message,
	                            'success'
	                        );

	                        loadRoadWarDetails();

	                    } else {

	                        Swal.fire(
	                            'Error',
	                            response.message,
	                            'error'
	                        );
	                    }
	                },

	                error: function () {

	                    Swal.fire(
	                        'Error',
	                        'Failed to delete record',
	                        'error'
	                    );
	                },

	                complete: function () {
	                    $("#pageLoader").hide();
	                }
	            });
	        }
	    });
	});

	$('#zoneDropdown').change(function () {

		let zone = $(this).val();

		$('#wardDropdown').empty()
			.append('<option value="">Select Ward</option>');
		
		$('#roadDropdown').empty()
		.append('<option value="">Select Road</option>');

		if (zone) {

			$.ajax({
				url: '/gcc/api/roadwarweb/register/getwardbyzone',
				type: 'GET',
				data: {
					zone: zone
				},
				success: function (response) {

					if (response.status) {

						$.each(response.data, function (index, ward) {

							$('#wardDropdown').append(
								'<option value="' + ward.ward_name + '">' +
								ward.ward_name +
								'</option>'
							);

						});

					}

				},
				error: function () {
					alert('Failed to load wards.');
				}
			});

		}

	});
	
	
	$('#wardDropdown').change(function () {

		let ward = $(this).val();

		$('#roadDropdown').empty()
			.append('<option value="">Select Road</option>');

		if (ward) {

			$.ajax({
				url: '/gcc/api/roadwarweb/register/getRoadNamesByWard',
				type: 'GET',
				data: {
					ward: ward
				},
				beforeSend: function () {
					$("#pageLoader").show();
				},
				success: function (response) {

					console.log("API Response:", response);

					if (response.status && response.data.length > 0) {

						$.each(response.data, function (index, road) {

							console.log("Road:", road);

							$('#roadDropdown').append(
								$('<option>', {
									value: road.road_id,
									text: road.road_name
								})
							);
						});
						
						 // Destroy existing Select2 if already initialized
				        if ($('#roadDropdown').hasClass("select2-hidden-accessible")) {
				            $('#roadDropdown').select2('destroy');
				        }

				        // Initialize Select2
				        $('#roadDropdown').select2({
				            placeholder: "Select Road",
				            allowClear: true,
				            width: '100%'
				        });


					} else {
						console.log("No roads found");
					}
				},
				error: function (xhr, status, error) {
					console.log("Error:", error);
					console.log(xhr.responseText);
				},
				complete: function () {
					$("#pageLoader").hide();
				}
			});
		}
	});

	function createRelayBlock(item = {}) {

	    let monthOptions =
	        '<option value="">Select Month</option>';

	    monthList.forEach(month => {

	        monthOptions += `
	            <option value="${month.id}"
	                ${month.id == item.relay_month ? 'selected' : ''}>
	                ${month.month_name}
	            </option>`;
	    });

	    let yearOptions =
	        '<option value="">Select Year</option>';

	    yearList.forEach(year => {

	        yearOptions += `
	            <option value="${year.id}"
	                ${year.id == item.relay_year ? 'selected' : ''}>
	                ${year.year_name}
	            </option>`;
	    });

	    let relayRoadMaterialOptions='<option value="">Select Material</option>';
	    
	    roadtypeMaterialList.forEach(roadtype => {
	    	relayRoadMaterialOptions +=`
	    		<option value = "${roadtype.id}" 
	    		 ${roadtype.id == item.road_type_material ? 'selected' : ''}>
	    		 ${roadtype.roadtype_material}
	    		</option>
	    	`;
	    });
	    
	    return `
	        <div class="relay-block border p-3 mb-3">

	            <div class="row">

	                <div class="col-md-2">
	                    <label>Month of relaying<span class="text-danger">*</span></label>

	                    <select class="form-control relay_month">
	                        ${monthOptions}
	                    </select>
	                </div>

	                <div class="col-md-2">
	                    <label>Year of relaying<span class="text-danger">*</span></label>

	                    <select class="form-control relay_year">
	                        ${yearOptions}
	                    </select>
	                </div>
	                
	                <div class="col-md-2">
	                    <label>Roadtype Material<span class="text-danger">*</span></label>
	
	                    <select class="form-control relay_roadtype_material">
	                        ${relayRoadMaterialOptions}
	                    </select>
                	</div>

	                <div class="col-md-3">
	                    <label>Completion Report Value (CR)<span class="text-danger">*</span></label>

	                    <input type="text"
	                           class="form-control cr_value decimal-only"
	                           value="${item.cr_value || ''}">
	                </div>

	                <div class="col-md-3">
	                    <label>Type/subgrade base of the road<span class="text-danger">*</span></label>

	                    <input type="text"
	                           class="form-control road_type"
	                           value="${item.road_type || ''}">
	                </div>

	                <div class="col-md-12 mt-3">
	                    <label>Remarks Reg.type of relaying<span class="text-danger">*</span></label>

	                    <textarea class="form-control remarks">${item.remarks || ''}</textarea>
	                </div>

	                <div class="col-md-12 mt-3 text-right">
	                    <button type="button"
	                            class="btn btn-danger btn-sm removeRelayRow">
	                        Remove
	                    </button>
	                </div>

	            </div>

	        </div>
	    `;
	}

	function validateRelayingDetails() {

	    let isValid = true;

	    $('.relay-block').each(function(index) {

	        let rowNo = index + 1;

	        let month = $(this).find('.relay_month').val();
	        let year = $(this).find('.relay_year').val();
	        let roadtype_material = $(this).find('.relay_roadtype_material').val();
	        let crValue = $(this).find('.cr_value').val();
	        let roadType = $(this).find('.road_type').val();
	        let remarks = $(this).find('.remarks').val();

	        if (!month) {

	            Swal.fire(
	                'Warning',
	                'Select Month of Relaying in Set ' + rowNo +' in Relaying Details',
	                'warning'
	            );

	            isValid = false;
	            return false;
	        }

	        if (!year) {

	            Swal.fire(
	                'Warning',
	                'Select Year of Relaying in Set ' + rowNo+' in Relaying Details',
	                'warning'
	            );

	            isValid = false;
	            return false;
	        }
	        
	        if (!roadtype_material) {

	            Swal.fire(
	                'Warning',
	                'Select Roadtype material in Set ' + rowNo+' in Relaying Details',
	                'warning'
	            );

	            isValid = false;
	            return false;
	        }

	        if (!validatePositiveNumber(
	                crValue,
	                'CR Value in Set ' + rowNo
	        )) {

	            isValid = false;
	            return false;
	        }

	        if ($.trim(roadType) === '') {

	            Swal.fire(
	                'Warning',
	                'Enter Type/Subgrade Base of the Road in Set ' + rowNo+' in Relaying Details',
	                'warning'
	            );

	            isValid = false;
	            return false;
	        }

	        if ($.trim(remarks) === '') {

	            Swal.fire(
	                'Warning',
	                'Enter Remarks in Set ' + rowNo+' in Relaying Details',
	                'warning'
	            );

	            isValid = false;
	            return false;
	        }

	    });

	    return isValid;
	}
	
	
	
	
	function validatePositiveNumber(value, fieldName) {

	    if (parseFloat(value) <= 0) {

	        Swal.fire(
	            'Warning',
	            fieldName + ' must be valid number or greater than 0',
	            'warning'
	        );

	        return false;
	    }

	    return true;
	}
	
	function getRelayingDetails() {

	    let relays = [];

	    $('.relay-block').each(function () {

	        relays.push({

	            relay_month:
	                $(this).find('.relay_month').val(),

	            relay_year:
	                $(this).find('.relay_year').val(),
	                
	            road_type_material:
		            $(this).find('.relay_roadtype_material').val(),

	            cr_value:
	                $(this).find('.cr_value').val(),

	            road_type:
	                $(this).find('.road_type').val(),

	            remarks:
	                $(this).find('.remarks').val()

	        });

	    });

	    return relays;
	}
