		let editId = 0;
		function openAddModal() {

			editId = 0;

			$("#educationName").val('');

			$(".modal-title").text("Add Where About");

			let modal = new bootstrap.Modal(
				document.getElementById('educationModal')
			);

			modal.show();
		}

		function loadEducationTable() {

			$.ajax({

				url: "/gcc/api/children-survey/whereaboutmasterlist",
				type: "GET",

				success: function (data) {

					let tbody = "";

					data.forEach(function (row, index) {
						let statusBadge = `<span class="badge">Active</span>`;

						let actionButton = row.isactive == 1
							? `
                        <button class="btn btn-danger btn-sm"
                            onclick="toggleStatus(${row.id},0)">
                            Disable
                        </button>
                    `
							: `
                        <button class="btn btn-success btn-sm"
                            onclick="toggleStatus(${row.id},1)">
                            Enable
                        </button>
                    `;

						tbody += `
                    <tr>

                        <td>${row.id}</td>

                        <td>${row.english_name}</td>

                        <td>${statusBadge}</td>

                         <td>
        <button class="btn btn-danger btn-sm"
            onclick="toggleStatus(${row.id},0)">
            Delete
        </button>
    </td>

    <td>
        <button class="btn btn-primary btn-sm"
            onclick="editEducation(${row.id},'${row.english_name}')">
            Edit
        </button>
    </td>

                    </tr>
                `;
					});

					if ($.fn.DataTable.isDataTable('#educationTable')) {

						$('#educationTable')
							.DataTable()
							.clear()
							.destroy();
					}

					$("#educationTable tbody").html(tbody);

					$('#educationTable').DataTable({
						responsive: true
					});
				}
			});
		}
		function editEducation(id, name) {

			editId = id;

			$("#educationName").val(name);

			$(".modal-title").text("Edit Where About");

			let modal = new bootstrap.Modal(
				document.getElementById('educationModal')
			);

			modal.show();
		}

		function saveEducation() {

			$.ajax({

				url: "/gcc/api/children-survey/whereaboutsave",

				type: "POST",

				contentType: "application/json",

				data: JSON.stringify({
					id: editId,

					english_name: $("#educationName").val()

				}),

				success: function () {

					Swal.fire({
						icon: 'success',
						title: 'Saved Successfully'
					});

					bootstrap.Modal.getInstance(
						document.getElementById('educationModal')
					).hide();

					loadEducationTable();
				}
			});
		}

		function toggleStatus(id, status) {

			$.ajax({

				url: "/gcc/api/children-survey/whereaboutstatus",

				type: "POST",

				contentType: "application/json",

				data: JSON.stringify({

					id: id,
					status: status

				}),

				success: function () {

					Swal.fire({
						icon: 'success',
						title: 'Status Updated'
					});

					loadEducationTable();
				}
			});
		}
