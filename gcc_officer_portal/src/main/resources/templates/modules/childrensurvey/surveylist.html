		//using flag
		function viewChildSurvey(surveyId) {

			$.ajax({

				url: "/gcc/api/children-survey/details",

				type: "GET",

				data: {
					surveyId: surveyId
				},

				success: function (data) {

					let html = "";

					function buildSection(title, sectionData) {

						let sectionHtml = `

                    <div class="survey-section mb-5">

                        <h5 class="section-heading">
                            ${title}
                        </h5>

                        <div class="row">
                `;

						Object.keys(sectionData).forEach(function (key) {

							sectionHtml += `

                        <div class="col-md-6 mb-3">

                            <div class="detail-card">

                                <div class="detail-label">
                                    ${key}
                                </div>

                                <div class="detail-value">
                                    ${sectionData[key] || '-'}
                                </div>

                            </div>

                        </div>
                    `;
						});

						sectionHtml += `
                        </div>

                    </div>
                `;

						return sectionHtml;
					}
					html += buildSection(
						"Location Details",
						data.locationDetails
					);

					html += buildSection(
						"Personal Information",
						data.personalInformation
					);



					html += buildSection(
						"Education Details",
						data.educationDetails
					);

					html += buildSection(
						"Health Details",
						data.healthDetails
					);

					html += buildSection(
						"Document Details",
						data.documentDetails
					);

					html += buildSection(
						"Vulnerability Details",
						data.vulnerabilityDetails
					);

					$("#surveyDetails").html(html);

					let modal = new bootstrap.Modal(
						document.getElementById('surveyModal')
					);

					modal.show();
				},

				error: function (xhr) {

					console.log(xhr);

					alert("Unable to fetch survey details");
				}
			});
		}

				type: "GET",
				data: {
					loginId: loginId,
					locationId: locationId,
					surveyDate: surveyDate
				},





				success: function (data) {

					let tbody = "";

					$.each(data, function (i, row) {

						tbody += `
					<tr>
<td>${formatDate(row.survey_date)}</td>
						<td>${row.survey_id || ''}</td>

						<td>${row.child_name || ''}</td>

						<td>${row.gender || ''}</td>

						<td>${row.age || ''}</td>

						<td>${row.mobile_number || ''}</td>

						<td>${row.area || ''}</td>

						<td>${row.education || ''}</td>

						<td>

							<button class="btn btn-info btn-sm"
									onclick="viewChildSurvey('${row.survey_id}')">

								<i class="fa fa-eye"></i>

							</button>

						</td>

					</tr>
				`;
					});

					$("#surveyTable tbody").html(tbody);

					$('#surveyTable').DataTable({

						dom: 'Bfrtip',

						buttons: [
							{
								extend: 'pageLength',

							},
							{

					$("#surveyorModal").modal("show");
				}

		}

		function loadSurveyors(isInitialLoad = false) {
			var area = $("#area").val();
			var fromDate = $("#fromDate").val();
			var toDate = $("#toDate").val();

			// SHOW SWAL ONLY WHEN SEARCH BUTTON CLICKED
			if (!isInitialLoad &&
				area == '' &&
				fromDate == '' &&
				toDate == '') {

				Swal.fire({
					icon: 'warning',
					title: 'Warning',
					text: 'Please select at least one filter.',
					confirmButtonColor: '#3085d6'
				});

				return;
			}

			if (fromDate != '') {
				if (toDate == '') {
					Swal.fire({
						icon: 'warning',
						title: 'Warning',
						text: 'Please select both from date and to date.',
						confirmButtonColor: '#3085d6'
					});
					return;
				}
			}
			if (toDate != '') {
				if (fromDate == '') {
					Swal.fire({
						icon: 'warning',
						title: 'Warning',
						text: 'Please select both from date and to date.',
						confirmButtonColor: '#3085d6'
					});
					return;
				}
			}

			if ($.fn.DataTable.isDataTable('#surveyorTable')) {
				$('#surveyorTable').DataTable().destroy();
			}

			$("#surveyorTable tbody").empty();

			$.ajax({

				url: "/gcc/api/children-survey/getSurveyorsList",

				type: "GET",

				data: {

					area: $("#area").val(),

					fromDate: $("#fromDate").val(),

					toDate: $("#toDate").val()

				},


				success: function (response) {

					let rows = "";

					$.each(response, function (i, item) {
						//   <td>${item.surveyor_id || ''}</td>
						// <td>${item.survey_date || ''}</td>
						rows += `
                    <tr>
                       <td>${formatDate(item.survey_date)}</td>
                     
                        <td>${item.user_name || ''}</td>
                        <td>${item.mobile_no || ''}</td>
                        <td>${item.area || ''}</td>
                        <td>${item.total_survey_done || 0}</td>
                       <td>

                            <button class="btn btn-info btn-sm"
                                    onclick="viewSurvey1('${item.loginId}', '${item.location_id}', '${item.survey_date}')">

                                <i class="fa fa-eye"></i>

                            </button>

                        </td>

                    </tr>
                `;
					});

					$("#surveyorTable tbody").html(rows);

					$('#surveyorTable').DataTable({

						dom: 'Bfrtip',

						buttons: [
							{
								extend: 'pageLength',
								className: 'btn btn-warning'
							},
							{
								extend: 'excelHtml5',
								text: 'Excel',
								className: 'btn btn-success'
							},
							{
								extend: 'pdfHtml5',
								text: 'PDF',
								className: 'btn btn-secondary',
								orientation: 'landscape',
								pageSize: 'A4'
							}
						],

						responsive: true,
						pageLength: 10

					});

				}
			});
		}
		function formatDate(dateString) {

			if (!dateString) return '';

			const date = new Date(dateString);

			const day = String(date.getDate()).padStart(2, '0');

			const month = String(date.getMonth() + 1).padStart(2, '0');

			const year = date.getFullYear();

			return `${day}-${month}-${year}`;
		}

								extend: 'pageLength',

							},
							{
								extend: 'excelHtml5',

								className: 'btn btn-success'
							},

		function loadDropdowns() {
