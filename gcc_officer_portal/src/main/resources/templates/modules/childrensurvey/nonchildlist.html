		async function downloadBulkSurveyExcel() {

			let area = $("#area").val();
			let fromDate = $("#fromDate").val();
			let toDate = $("#toDate").val();

			try {

				let response = await $.ajax({

					url: "/gcc/api/children-survey/nonsurveyed/list",
					type: "GET",
					data: {

						area: area,
						fromDate: fromDate,
						toDate: toDate
					}
				});

				let excelData = [];

				response.forEach(function (row, index) {

					excelData.push({

						"S.No": index + 1,
						"Date": row.survey_date || '',
						"Survey ID": row.survey_id || '',
						"Reason": row.reason || '',
						"Area": row.area || '',
						"House No": row.house_no || '',
						"Block No": row.block_no || ''

					});

				});

				if (excelData.length === 0) {

					alert("No data found");
					return;
				}

				let worksheet = XLSX.utils.json_to_sheet(excelData);

				let workbook = XLSX.utils.book_new();

				XLSX.utils.book_append_sheet(
					workbook,
					worksheet,
					"Non Survey Child List"
				);

				XLSX.writeFile(
					workbook,
					"Non_Survey_Child_List.xlsx"
				);

			} catch (e) {

				console.log(e);
				alert("Error downloading excel");
			}
		}

		function fetchSurveyData(isInitialLoad = false) {


			var gender = $("#gender").val();
			var age = $("#age").val();
			var area = $("#area").val();
			var education = $("#education").val();
			var fromDate = $("#fromDate").val();
			var toDate = $("#toDate").val();

			// SHOW SWAL ONLY WHEN SEARCH BUTTON CLICKED
			if (!isInitialLoad &&

				gender == '' &&
				age == '' &&
				area == '' &&
				education == '' &&
				fromDate == '' &&
				toDate == '') {

				Swal.fire({
					icon: 'warning',
					title: 'Warning',
					text: 'Please select at least one filter.',
					confirmButtonColor: '#3085d6'
				});

				return;
			}
			if (fromDate != '') {
				if (toDate == '') {
					Swal.fire({
						icon: 'warning',
						title: 'Warning',
						text: 'Please select both from date and to date.',
						confirmButtonColor: '#3085d6'
					});
					return;
				}
			}
			if (toDate != '') {
				if (fromDate == '') {
					Swal.fire({
						icon: 'warning',
						title: 'Warning',
						text: 'Please select both from date and to date.',
						confirmButtonColor: '#3085d6'
					});
					return;
				}
			}



			$.ajax({
				url: "/gcc/api/children-survey/nonsurveyed/list",
				type: "GET",
				data: {


					area: $("#area").val(),

					fromDate: $("#fromDate").val(),
					toDate: $("#toDate").val()
				},
				success: function (data) {

					let tbody = "";

					data.forEach(function (row) {
						//<td>${row.survey_date || ''}</td>

						tbody += `
<tr>

    <td>${formatDate(row.survey_date)}</td>

    <td>${row.survey_id || ''}</td>

    <td>${row.reason || ''}</td>

    <td>${row.area || ''}</td>

    <td>${row.house_no || ''}</td>

    <td>${row.block_no || ''}</td>

    

</tr>
`;
					});

					// 🔥 Destroy old DataTable if exists
					if ($.fn.DataTable.isDataTable('#surveyTable')) {
						$('#surveyTable').DataTable().clear().destroy();
					}

					// Set new data
					$("#surveyTable tbody").html(tbody);

					// 🔥 Reinitialize DataTable WITH BUTTONS
					$('#surveyTable').DataTable({
						dom: 'Bfrtip',
						buttons: [
							{
								extend: 'pageLength',
								className: 'btn btn-warning'
							},
							{
								extend: 'excelHtml5',
								text: 'Excel',
								className: 'btn btn-success'
							},
							{
								extend: 'pdfHtml5',
								text: 'PDF',
								className: 'btn btn-secondary',
								orientation: 'landscape',
								pageSize: 'A4'
							}
						],
						responsive: true,
						destroy: true


					});
				}
			});
		}
		function formatDate(dateString) {

			if (!dateString) return '';

			const date = new Date(dateString);

			const day = String(date.getDate()).padStart(2, '0');

			const month = String(date.getMonth() + 1).padStart(2, '0');

			const year = date.getFullYear();

			return `${day}-${month}-${year}`;
		}
